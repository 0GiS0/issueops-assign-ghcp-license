name: "IssueOps: Assign Copilot seat"

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

concurrency:
  group: copilot-seat-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

env:
  ORG: ${{ github.repository_owner }}
  API_VERSION: "2022-11-28"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Check /copilot-assign command
        uses: github/command@v1.2.2
        id: command
        with:
          command: ".copilot-assign"
          reaction: "rocket"
          allowed_contexts: "issue"
          permissions: "admin"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract target user from Issue Form
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const run = require('./scripts/parse-issue-username.js');
            await run({ github, context, core });

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.COPILOT_APP_ID }}
          private-key: ${{ secrets.COPILOT_APP_PRIVATE_KEY }}
          owner: ${{ env.ORG }}

      - name: Copilot seat assign
        id: assign
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ORG: ${{ steps.parse.outputs.org }}
          USER: ${{ steps.parse.outputs.target }}
        run: |
          set -euo pipefail

          state=$(scripts/assign-copilot-seat.sh membership "$USER")

          if [[ "$state" != "active" ]]; then
            echo "result=error" >> "$GITHUB_OUTPUT"
            echo "message=User @$USER is not an active member of $ORG (state: ${state:-unknown})." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if scripts/assign-copilot-seat.sh status "$USER" >/dev/null 2>&1; then
            echo "result=already_assigned" >> "$GITHUB_OUTPUT"
            echo "message=Seat already assigned to @$USER." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          scripts/assign-copilot-seat.sh assign "$USER"
          echo "result=assigned" >> "$GITHUB_OUTPUT"
          echo "message=Seat assignment requested for @$USER." >> "$GITHUB_OUTPUT"

      - name: Comment + label + close
        uses: actions/github-script@v7
        env:
          RESULT: ${{ steps.assign.outputs.result }}
          MESSAGE: ${{ steps.assign.outputs.message }}
          USER: ${{ steps.parse.outputs.target }}
        with:
          script: |
            const run = require('./scripts/comment-and-close-issue.js');
            await run({ github, context, core });
