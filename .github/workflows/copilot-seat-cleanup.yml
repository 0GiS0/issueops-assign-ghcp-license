name: "Copilot seat cleanup (inactivity)"

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no revocations, just report)"
        required: false
        default: true
        type: boolean
      inactivity_days:
        description: "Days of inactivity before revocation"
        required: false
        default: "30"
        type: string

permissions:
  contents: read
  issues: write

env:
  ORG: ${{ github.repository_owner }}
  API_VERSION: "2022-11-28"
  INACTIVITY_DAYS: ${{ inputs.inactivity_days || '30' }}
  # Schedule runs default to dry_run=true (report only).
  # To revoke, dispatch manually with dry_run=false.
  DRY_RUN: ${{ github.event_name == 'schedule' && 'true' || inputs.dry_run }}

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.COPILOT_APP_ID }}
          private-key: ${{ secrets.COPILOT_APP_PRIVATE_KEY }}
          owner: ${{ env.ORG }}

      - name: Find inactive Copilot seats
        id: find-inactive
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: scripts/find-inactive-seats.sh

      - name: Revoke inactive seats
        if: steps.find-inactive.outputs.inactive_count != '0'
        id: revoke
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          INACTIVE_USERS: ${{ steps.find-inactive.outputs.inactive_users }}
        run: scripts/revoke-inactive-seats.sh

      - name: Create summary issue
        if: steps.find-inactive.outputs.inactive_count != '0'
        uses: actions/github-script@v7
        env:
          INACTIVE_USERS: ${{ steps.find-inactive.outputs.inactive_users }}
          INACTIVE_COUNT: ${{ steps.find-inactive.outputs.inactive_count }}
          TOTAL_SEATS: ${{ steps.find-inactive.outputs.total_seats }}
          REVOKED: ${{ steps.revoke.outputs.revoked }}
          FAILED: ${{ steps.revoke.outputs.failed }}
        with:
          script: |
            const run = require('./scripts/create-cleanup-issue.js');
            await run({ github, context, core });

      - name: Write Job Summary
        if: always()
        env:
          INACTIVE_USERS: ${{ steps.find-inactive.outputs.inactive_users }}
          INACTIVE_COUNT: ${{ steps.find-inactive.outputs.inactive_count }}
          TOTAL_SEATS: ${{ steps.find-inactive.outputs.total_seats }}
        run: scripts/job-summary-cleanup.sh
